apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cadvisor
  labels:
    release: prometheus-operator
  namespace: monitoring
spec:
  jobLabel: app
  selector:
    matchLabels:
      app: cadvisor
  namespaceSelector:
    matchNames:
    - kube-system
  endpoints:
  - port: http
    interval: 10s
    path: /metrics
